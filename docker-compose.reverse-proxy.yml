services:
  ottrbox:
    image: yunmengdocker/ottrbox-fil:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9970:3000"
    environment:
      - TRUST_PROXY=true
    volumes:
      - "./data:/opt/app/backend/data"
      - "./data/images:/opt/app/frontend/public/img"
#      - "./config.yaml:/opt/app/config.yaml"
